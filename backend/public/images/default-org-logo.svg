<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="100%" height="100%">
  <!-- Background -->
  <rect width="200" height="200" fill="#0b0f19" rx="24" />
  
  <!-- Cyber Grid Lines -->
  <line x1="20" y1="0" x2="20" y2="200" stroke="#1e293b" stroke-width="0.5" />
  <line x1="60" y1="0" x2="60" y2="200" stroke="#1e293b" stroke-width="0.5" />
  <line x1="100" y1="0" x2="100" y2="200" stroke="#1e293b" stroke-width="0.5" />
  <line x1="140" y1="0" x2="140" y2="200" stroke="#1e293b" stroke-width="0.5" />
  <line x1="180" y1="0" x2="180" y2="200" stroke="#1e293b" stroke-width="0.5" />
  
  <line x1="0" y1="20" x2="200" y2="20" stroke="#1e293b" stroke-width="0.5" />
  <line x1="0" y1="60" x2="200" y2="60" stroke="#1e293b" stroke-width="0.5" />
  <line x1="0" y1="100" x2="200" y2="100" stroke="#1e293b" stroke-width="0.5" />
  <line x1="0" y1="140" x2="200" y2="140" stroke="#1e293b" stroke-width="0.5" />
  <line x1="0" y1="180" x2="200" y2="180" stroke="#1e293b" stroke-width="0.5" />

  <!-- Outer Glow Ring -->
  <circle cx="100" cy="100" r="75" fill="none" stroke="#3b82f6" stroke-width="1.5" stroke-dasharray="8,4" opacity="0.3" />
  <circle cx="100" cy="100" r="70" fill="none" stroke="#10b981" stroke-width="2" opacity="0.6" />

  <!-- Central Shield -->
  <path d="M100 55 L145 70 V115 C145 145 100 160 100 160 C100 160 55 145 55 115 V70 Z" fill="none" stroke="#10b981" stroke-width="4" stroke-linejoin="round" />
  <path d="M100 65 L135 77 V112 C135 136 100 148 100 148 C100 148 65 136 65 112 V77 Z" fill="#3b82f6" fill-opacity="0.1" stroke="#3b82f6" stroke-width="2" stroke-linejoin="round" />

  <!-- Crown/Star Symbol inside Shield -->
  <path d="M100 85 L106 97 L119 99 L110 108 L112 121 L100 115 L88 121 L90 108 L81 99 L94 97 Z" fill="#10b981" opacity="0.85" />
</svg>
